name: "gn auto update"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  get_current_info:
    runs-on: ubuntu-latest
    outputs:
      pkg_source_version: ${{ steps.info.outputs.pkg_source_version }}
      pkg_source_date: ${{ steps.info.outputs.pkg_source_date }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: info
        id: info
        run: |
          echo "pkg_source_version=$(grep 'PKG_SOURCE_VERSION:=' gn/Makefile | cut -d '=' -f 2)" >> $GITHUB_OUTPUT
          echo "pkg_source_date=$(grep 'PKG_SOURCE_DATE:=' gn/Makefile | cut -d '=' -f 2)" >> $GITHUB_OUTPUT

  get_latest_info:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.info.outputs.commit_sha }}
      commit_date: ${{ steps.info.outputs.commit_date }}
      short_ver: ${{ steps.info.outputs.short_ver }}
      long_ver: ${{ steps.info.outputs.long_ver }}
      commit_position: ${{ steps.info.outputs.commit_position }}
      checksum: ${{ steps.info.outputs.checksum }}
    steps:
      - name: install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y zstd

      - name: clone gn
        run: git clone https://gn.googlesource.com/gn.git gn-src

      - name: info
        id: info
        run: |
          set -euo pipefail

          PKG_NAME=gn
          PKG_SOURCE_URL=https://gn.googlesource.com/gn.git
          COMMIT_SHA=$(git -C gn-src rev-parse HEAD)
          COMMIT_DATE=$(git -C gn-src log -1 --format=%cs)
          SHORT_VER=$(git -C gn-src rev-parse --short=8 HEAD)
          LONG_VER=${COMMIT_SHA:0:12}
          COMMIT_POSITION=$(git -C gn-src rev-list --count HEAD)
          PKG_VERSION="${COMMIT_DATE//-/.}~${SHORT_VER}"
          SUBDIR="${PKG_NAME}-${PKG_VERSION}"
          FILE="${SUBDIR}.tar.zst"
          WORK_DIR="${RUNNER_TEMP}/gn-openwrt-hash"

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          git clone "$PKG_SOURCE_URL" "$WORK_DIR/$SUBDIR"
          git -C "$WORK_DIR/$SUBDIR" checkout "$COMMIT_SHA"
          TAR_TIMESTAMP=$(git -C "$WORK_DIR/$SUBDIR" log -1 --no-show-signature --format='@%ct')

          git -C "$WORK_DIR/$SUBDIR" config core.abbrev 8
          git -C "$WORK_DIR/$SUBDIR" archive --format=tar HEAD --output="$WORK_DIR/$SUBDIR.tar.git"
          tar --numeric-owner --owner=0 --group=0 --ignore-failed-read -C "$WORK_DIR/$SUBDIR" -f "$WORK_DIR/$SUBDIR.tar.git" -r .git .gitmodules 2>/dev/null || true

          rm -rf "$WORK_DIR/$SUBDIR"
          mkdir "$WORK_DIR/$SUBDIR"
          tar -C "$WORK_DIR/$SUBDIR" -xf "$WORK_DIR/$SUBDIR.tar.git"
          (cd "$WORK_DIR/$SUBDIR" && git submodule update --init --recursive -- && rm -rf .git .gitmodules) || true
          tar --numeric-owner --owner=0 --group=0 --mode=a-s --sort=name --mtime="$TAR_TIMESTAMP" -c -C "$WORK_DIR" "$SUBDIR" | zstd -T0 --ultra -20 -c > "$WORK_DIR/$FILE"
          CHECKSUM=$(sha256sum "$WORK_DIR/$FILE" | cut -d ' ' -f 1)

          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "short_ver=$SHORT_VER" >> $GITHUB_OUTPUT
          echo "long_ver=$LONG_VER" >> $GITHUB_OUTPUT
          echo "commit_position=$COMMIT_POSITION" >> $GITHUB_OUTPUT
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

  update:
    needs:
      - get_current_info
      - get_latest_info
    if: needs.get_current_info.outputs.pkg_source_version != needs.get_latest_info.outputs.commit_sha
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Makefile
        run: |
          sed -i "s/PKG_SOURCE_DATE:=.*/PKG_SOURCE_DATE:=${{ needs.get_latest_info.outputs.commit_date }}/" gn/Makefile
          sed -i "s/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=${{ needs.get_latest_info.outputs.commit_sha }}/" gn/Makefile
          sed -i "s/PKG_MIRROR_HASH:=.*/PKG_MIRROR_HASH:=${{ needs.get_latest_info.outputs.checksum }}/" gn/Makefile

      - name: Update last_commit_position.h
        run: |
          COMMIT_POSITION_FILE="gn/src/out/last_commit_position.h"
          if [ -f "$COMMIT_POSITION_FILE" ]; then
            sed -i "6s/#define LAST_COMMIT_POSITION_NUM .*/#define LAST_COMMIT_POSITION_NUM ${{ needs.get_latest_info.outputs.commit_position }}/" "$COMMIT_POSITION_FILE"
            sed -i "7s/#define LAST_COMMIT_POSITION .*/#define LAST_COMMIT_POSITION \"${{ needs.get_latest_info.outputs.commit_position }} (${{ needs.get_latest_info.outputs.long_ver }})\"/" "$COMMIT_POSITION_FILE"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gn/Makefile gn/src/out/last_commit_position.h
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "gn: auto update to ${{ needs.get_latest_info.outputs.short_ver }}"
          git push origin main
