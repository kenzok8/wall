name: upx-static sync from upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday 10:00 Asia/Shanghai

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update upx-static Makefile
        run: |
          set -euo pipefail
          python3 .github/scripts/update_upx_static.py
          grep -E "^PKG_(VERSION|RELEASE|SOURCE_VERSION|HASH)" upx-static/Makefile || true

      - name: Commit and push
        run: |
          set -euo pipefail
          if git diff --quiet -- upx-static/Makefile; then
            echo "upx-static already latest"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          version=$(sed -n 's/^PKG_VERSION:=//p' upx-static/Makefile)
          git add upx-static/Makefile
          git commit -m "upx-static: sync to v${version}"
          git push
